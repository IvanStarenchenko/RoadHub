services:
  roadhub-frontend:
    image: ${ROADHUB_IMAGE:-tymurmustafaiev/roadhub-frontend:latest}
    container_name: roadhub-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${ROADHUB_PORT:-3000}:3000"
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: roadhub-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --interval
      - ${WATCHTOWER_POLL_INTERVAL:-300}
