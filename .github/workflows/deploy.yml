name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BASE_URL=${{ secrets.BASE_URL }}
            NEXT_GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.NEXT_GOOGLE_GENERATIVE_AI_API_KEY }}
            NEXT_PUBLIC_TMDB_TOKEN=${{ secrets.NEXT_PUBLIC_TMDB_TOKEN }}
            NEXT_PUBLIC_RAWG_API=${{ secrets.NEXT_PUBLIC_RAWG_API }}
          tags: |
            tymurmustafaiev/roadhub-frontend:latest
            tymurmustafaiev/roadhub-frontend:${{ github.sha }}
